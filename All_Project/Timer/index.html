<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timer UI</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="timer-container">
        <h1>⏱ Timer</h1>

        <!-- Timer Display -->
        <div class="display">
            00:00
        </div>

        <!-- Time Options -->
        <div class="time-options">
            <button>2 Min</button>
            <button>3 Min</button>
            <button>5 Min</button>
        </div>

        <!-- Custom Time -->
        <div class="custom-time">
            <input type="number" placeholder="Enter minutes">
            <span>min</span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="start">Start</button>
            <button class="reset">Reset</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
